<base-page>
  <header class="d-flex justify-content-center">
    <div class="d-flex align-items-center">
      <div>
        <h1 class="d-flex justify-content-center">Welcome!</h1>
        <figure>
          <blockquote class="d-flex justify-content-center"

        </figure>
      </div>
    </div>
  </header>

  <section>

  </section>
</base-page>
